version: '3.8'

services:
  # PHP Apache Service for Laravel
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cems-laravel-app
    restart: always
    ports:
      - "8080:80"
    environment:
      - DB_HOST=db
      - DB_CONNECTION=mysql
      - DB_PORT=3306
      - DB_DATABASE=cems
      - DB_USERNAME=cems_user
      - DB_PASSWORD=cems_password
      - APP_ENV=local
      - APP_DEBUG=true
      - APP_KEY=base64:7K58z58z58z58z58z58z58z58z58z58z58z58z58z58= # Placeholder, should be regenerated
    depends_on:
      - db
    volumes:
      - .:/var/www/html

  # MariaDB Database Service
  db:
    image: mariadb:10.6
    container_name: cems-laravel-db
    restart: always
    environment:
      - MARIADB_DATABASE=cems
      - MARIADB_USER=cems_user
      - MARIADB_PASSWORD=cems_password
      - MARIADB_ROOT_PASSWORD=root_password
    ports:
      - "3306:3306"
    volumes:
      - cems-laravel-db-data:/var/lib/mysql
      # Automatically import SQL file on first startup
#      - ./old-app/cems.sql:/docker-entrypoint-initdb.d/cems.sql
      - ./cems-laravel.sql:/docker-entrypoint-initdb.d/cems.sql

volumes:
  cems-laravel-db-data:
