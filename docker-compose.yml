version: '3.8'

services:
  # PHP Apache Service for Laravel
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cems-laravel-app
    restart: always
    ports:
      - "8080:80"
      - "5173:5173" # Port untuk Vite dev server
    env_file:
      - .env
    environment:
      - DB_HOST=db
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/var/www/html
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # MariaDB Database Service
  db:
    image: mariadb:10.6
    container_name: cems-laravel-db
    restart: always
    env_file:
      - .env
    environment:
      - MARIADB_DATABASE=${DB_DATABASE:-cems}
      - MARIADB_USER=${DB_USERNAME:-cems_user}
      - MARIADB_PASSWORD=${DB_PASSWORD:-cems_password}
      - MARIADB_ROOT_PASSWORD=${DB_PASSWORD:-root_password}
    ports:
      - "3306:3306"
    volumes:
      - cems-laravel-db-data:/var/lib/mysql
      - ./cems_2026-03-15.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  cems-laravel-db-data:
